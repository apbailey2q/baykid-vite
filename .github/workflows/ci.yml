name: CI — Lint · Type Check · Build

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

# Cancel any in-progress run for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # Placeholder env vars so the build doesn't fail without real secrets.
  # Real secrets are injected via Vercel's dashboard, not here.
  ANTHROPIC_API_KEY: 'ci-placeholder-key'
  VITE_SUPABASE_URL: 'https://ci-placeholder.supabase.co'
  VITE_SUPABASE_ANON_KEY: 'ci-placeholder-anon-key'
  VITE_ENABLE_DEMO_ACCESS: 'false'
  VITE_ENVIRONMENT: 'ci'
  VITE_APP_VERSION: ${{ github.sha }}

jobs:
  # ── Job 1: Lint + Type Check ─────────────────────────────────────────────────
  # ESLint is INFORMATIONAL ONLY — it runs on every push and the report shows
  # in the workflow summary, but its exit code never fails the job. TypeScript
  # remains a hard gate: any tsc error blocks the rest of CI and any deploy.
  # If you want ESLint to gate deploys again, flip `continue-on-error: false`
  # on the ESLint step (and remove the `id:`/conditional summary if you also
  # want to drop the report).
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Using `npm install` over `npm ci` because the lockfile was generated
      # with a different npm version than the runner's, and npm ci's strict
      # comparison rejects it. `npm install` honors the lockfile for versions
      # but is forgiving on metadata drift. CI doesn't commit any changes.
      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      - name: ESLint (informational — does not block CI)
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: ESLint report banner
        if: always()
        run: |
          if [ "${{ steps.eslint.outcome }}" = "success" ]; then
            echo "## ✅ ESLint clean"                       >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️  ESLint reported findings (informational only — not blocking)" >> $GITHUB_STEP_SUMMARY
            echo "View the full report in the **ESLint** step above. Lint cleanup is tracked separately from CI gating." >> $GITHUB_STEP_SUMMARY
          fi

      - name: TypeScript type check (BLOCKING)
        run: npx tsc --noEmit
        # No continue-on-error — tsc failures fail this job and block downstream.

  # ── Job 2: Build ──────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:       ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:  ${{ env.VITE_SUPABASE_ANON_KEY }}
          VITE_ENABLE_DEMO_ACCESS: ${{ env.VITE_ENABLE_DEMO_ACCESS }}
          VITE_ENVIRONMENT:        ${{ env.VITE_ENVIRONMENT }}
          VITE_APP_VERSION:        ${{ env.VITE_APP_VERSION }}

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ dist/index.html missing — build failed"
            exit 1
          fi
          echo "✅ dist/index.html found"
          echo "📦 Bundle sizes:"
          du -sh dist/assets/*.js 2>/dev/null | sort -h | tail -5 || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── Job 3: Deployment readiness (on main only) ────────────────────────────────
  readiness:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required Vercel env vars are documented
        run: |
          echo "Checking for required env var documentation…"
          REQUIRED_VARS=(
            "ANTHROPIC_API_KEY"
            "VITE_SUPABASE_URL"
            "VITE_SUPABASE_ANON_KEY"
            "VITE_ENABLE_DEMO_ACCESS"
          )
          FAILED=0
          for VAR in "${REQUIRED_VARS[@]}"; do
            if grep -q "$VAR" .env.production 2>/dev/null; then
              echo "  ✅ $VAR documented in .env.production"
            else
              echo "  ❌ $VAR missing from .env.production"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then exit 1; fi

      - name: Check no demo bypasses in production build
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist-check/

      - name: Scan for dev bypasses
        run: |
          echo "Scanning for development bypasses in production bundle…"
          # Warn if DEV_BYPASS_AUTH appears in the production bundle
          if grep -r "DEV_BYPASS_AUTH\|devbypass\|SKIP_AUTH" dist-check/ 2>/dev/null; then
            echo "⚠️  Warning: dev bypass patterns found in bundle — review before deploying"
          else
            echo "✅ No dev bypass patterns found"
          fi

  # ── Job 4: Notify on success (main branch only) ───────────────────────────────
  # ESLint is informational; this summary shows TypeScript + Build + Readiness
  # as the actual blocking gates. The ESLint result line is replaced with a
  # neutral marker so reviewers know lint is reported in the quality job above
  # but not a deploy gate.
  notify:
    name: Ready to Deploy
    runs-on: ubuntu-latest
    needs: [quality, build, readiness]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Summary
        run: |
          echo "## ✅ CI Passed — Ready for Vercel Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ℹ️  Informational (see Lint & Type Check job for findings) |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ✅ No errors (blocking) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ dist/ generated (blocking) |" >> $GITHUB_STEP_SUMMARY
          echo "| Readiness | ✅ Env vars documented (blocking) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Vercel will auto-deploy from main. Check the Vercel dashboard for deploy status." >> $GITHUB_STEP_SUMMARY
